# Canonical Fresh Jobs discovery policy (Workflow Lock 01 correction).
# Authoritative for freshness, geography, role eligibility, and source campaigns.

freshness:
  # Visibility tiers (hours)
  today_hours: 24
  fresh_hours: 72
  recent_hours: 168  # 7 days
  # Default owner Fresh Jobs includes TODAY + FRESH; RECENT optional below.
  default_visible_tiers:
    - TODAY
    - FRESH
    - RECENT
  unknown_timestamp_action: owner_review
  # States that must never age out of owner visibility solely due to freshness.
  never_age_out_states:
    - SHORTLISTED
    - PACKET_READY
    - PACKET_GENERATING
    - NEEDS_EDIT
    - APPROVED_FOR_SUBMISSION
    - SUBMITTED
    - FOLLOW_UP_DUE
    - RECRUITER_SIGNAL
    - INTERVIEW_SIGNAL
    - INTERVIEW_SCHEDULED
    - OFFER

geography:
  country: US
  remote_us: accept
  remote_unspecified: owner_review
  foreign_only: reject
  relocation_required: reject
  unknown: owner_review
  local_hybrid:
    - Harrisburg
    - Enola
    - Mechanicsburg
    - Camp Hill
    - Carlisle
    - York
    - Lancaster
    - Central Pennsylvania
    - Pennsylvania
    - PA

