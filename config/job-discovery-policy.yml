role_profiles:
  - id: tpm_delivery
    label: Technical Program / Project Leadership
    eligibility: primary
    title_patterns:
      - technical project manager
      - senior technical project manager
      - technical program manager
      - senior technical program manager
      - engineering program manager
      - technical delivery manager
      - platform program manager
      - engineering delivery lead
  - id: qe_manager
    label: Quality Engineering Management
    eligibility: primary
    title_patterns:
      - quality engineering manager
      - senior quality engineering manager
      - senior manager quality engineering
      - manager quality engineering
      - test engineering manager
      - software quality engineering manager
      - quality platform manager
      - qe manager
      - qa engineering manager
      - qa manager
      - connected vehicle quality engineering manager
  - id: director_qe
    label: Director / Head of Quality
    eligibility: primary
    title_patterns:
      - director of quality engineering
      - director quality engineering
      - director software quality
      - head of quality engineering
      - head of quality assurance
      - quality engineering director
      - director test engineering
      - qe transformation director
      - head of qe
      - senior director quality engineering
      - head of observability and quality engineering
      - head of observability quality engineering
      - head of quality assurance and technical enablement
      - senior director engineering quality
      - senior director quality engineering and observability
      - director quality engineering and platform reliability
  - id: platform_architect
    label: Principal / Staff / Architecture
    eligibility: primary
    title_patterns:
      - principal quality engineer
      - staff quality engineer
      - principal sdet
      - quality engineering architect
      - test automation architect
      - qe platform architect
      - test platform architect
      - quality platform architect
  - id: ai_enabled_qe
    label: AI Quality / Evaluation
    eligibility: primary
    title_patterns:
      - ai quality
      - llm evaluation
      - agent quality
      - ai enabled quality
      - responsible ai testing
      - ai platform quality
      - genai quality
      - agentic ai quality
  - id: performance_quality
    label: Performance / Reliability Quality
    eligibility: primary
    title_patterns:
      - performance engineering
      - performance test architect
      - reliability test
      - performance platform
  - id: secondary_em
    label: Engineering Manager (quality/platform scope)
    eligibility: secondary
    title_patterns:
      - engineering manager
      - manager engineering
    require_any:
      - quality
      - platform
      - developer productivity
      - test
      - automation
      - reliability
      - observability
  - id: secondary_sdet
    label: Senior SDET (advancement scope)
    eligibility: secondary
    title_patterns:
      - senior sdet
      - staff sdet
      - principal sdet
      - lead sdet

role_reject_patterns:
  - backend engineer
  - frontend engineer
  - full stack engineer
  - fullstack engineer
  - software engineer i
  - software engineer ii
  - junior
  - associate qa
  - manual tester
  - qa analyst
  - customer success
  - sales engineer
  - account executive
  - new business account executive
  - commercial account executive
  - renewals manager
  - marketing manager
  - product manager
  - product owner
  - people business partner
  - people partner
  - human resources
  - recruiter
  - air quality
  - supplier quality
  - environmental quality
  - manufacturing quality
  - hardware quality
  - product inspection
  - design quality engineering

# Full-text (title + company + description) domain exclusions applied even when a
# primary software-QE TITLE matched. Catches manufacturing / pharma / hardware
# "quality engineering" roles whose non-software nature only appears in the body
# (e.g. GMP pharmaceutical manufacturing, industrial product quality).
# Matched as contiguous normalized phrases only (no loose subsequence matching).
domain_reject_patterns:
  - gmp
  - cgmp
  - good manufacturing practice
  - pharmaceutical manufacturing
  - medical device manufacturing
  - supplier quality
  - manufacturing quality
  - environmental quality
  - hardware quality
  - product inspection
  - shop floor
  - production line
  - high quality products and services

salary:
  target_max_usd: 200000
  strong_max_usd: 170000
  # Below strong is REVIEW ranking signal — never hard reject on salary alone.

ingest:
  exclude_provenance:
    - fixture
    - test
  exclude_states:
    - REJECTED
    - CLOSED
  quarantine_state: SECONDARY_REVIEW
  owner_review_state: SECONDARY_REVIEW
  reject_state: REJECTED
  archive_state: CLOSED
