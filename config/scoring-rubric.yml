  fully_remote_us: highest
  remote_with_limited_travel: high
  harrisburg_area_hybrid: consider
  northeast_monthly_travel: consider
  regular_far_hybrid: low
  mandatory_relocation: reject

risk_policy:
  penalize_unstable_company: true
  penalize_title_without_scope: true
  penalize_evidence_gap: true
  reward_ai_enhanced_role: true
  reject_if_fabrication_required: true
