name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: career_os
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: career_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U career_os -d career_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+psycopg://career_os:testpass@localhost:5432/career_os
          APP_SECRET: ci-test-secret-key-32chars-minimum!
          TOKEN_ENCRYPTION_KEY: ci-test-token-encryption-key-32chars!
          OAUTH_FIXTURE_MODE: "true"
          GENERATED_ROOT: ${{ github.workspace }}/apps/api/generated
          CONFIG_ROOT: ${{ github.workspace }}/config
          CAREER_VAULT_ROOT: ${{ github.workspace }}/career_vault
        run: pytest -q

  validation-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        run: python scripts/validation/secret_scan.py
      - name: Prohibited source scan
        run: python scripts/validation/prohibited_source_scan.py

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build web
        working-directory: apps/web
        run: |
          npm install
          npm run build

  playwright-fixture:
    runs-on: ubuntu-latest
    needs: [api-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: career_os
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: career_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U career_os -d career_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Build web
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8000
        run: npm run build
      - name: Start API (fixture mode)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+psycopg://career_os:testpass@localhost:5432/career_os
          APP_SECRET: ci-test-secret-key-32chars-minimum!
          TOKEN_ENCRYPTION_KEY: ci-test-token-encryption-key-32chars!
          OAUTH_FIXTURE_MODE: "true"
          GENERATED_ROOT: ${{ github.workspace }}/apps/api/generated
          CONFIG_ROOT: ${{ github.workspace }}/config
          CAREER_VAULT_ROOT: ${{ github.workspace }}/career_vault
          CORS_ORIGINS: http://127.0.0.1:3000
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8000/health && break; sleep 2; done
      - name: Start web
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8000
        run: |
          npm run start &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:3000 && break; sleep 2; done
      - name: Seed Playwright e2e user
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+psycopg://career_os:testpass@localhost:5432/career_os
          APP_SECRET: ci-test-secret-key-32chars-minimum!
          TOKEN_ENCRYPTION_KEY: ci-test-token-encryption-key-32chars!
          E2E_TEST_PASSWORD: ci-e2e-playwright-password-32chars!
        run: python scripts/ensure_e2e_user.py
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install chromium --with-deps
      - name: Run Playwright (fixture mode)
        working-directory: apps/web
        env:
          PLAYWRIGHT_API_BASE: http://127.0.0.1:8000
          PLAYWRIGHT_WEB_BASE: http://127.0.0.1:3000
        run: npx playwright test
