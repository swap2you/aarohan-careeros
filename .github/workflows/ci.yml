name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: career_os
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: career_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U career_os -d career_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+psycopg://career_os:testpass@localhost:5432/career_os
          APP_SECRET: ci-test-secret-key-32chars-minimum!
          TOKEN_ENCRYPTION_KEY: ci-test-token-encryption-key-32chars!
          OAUTH_FIXTURE_MODE: "true"
        run: pytest -q

  validation-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        run: python scripts/validation/secret_scan.py
      - name: Prohibited source scan
        run: python scripts/validation/prohibited_source_scan.py

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build web
        working-directory: apps/web
        run: |
          npm install
          npm run build
