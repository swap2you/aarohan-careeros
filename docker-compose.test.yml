# Isolated test/E2E stack — separate project, postgres, credentials, network, and volume.
# Usage:
#   pwsh scripts/local/Start-Aarohan-E2E.ps1
#   pwsh scripts/local/Run-Aarohan-Tests.ps1
#
# Do NOT merge with docker-compose.yml. Owner and test stacks must stay independent.

name: aarohan-careeros-test

services:
  postgres-e2e:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: career_os_e2e
      POSTGRES_PASSWORD: ${E2E_POSTGRES_PASSWORD:?E2E_POSTGRES_PASSWORD required}
      POSTGRES_DB: career_os_e2e
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks: [career_os_test]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_os_e2e -d career_os_e2e"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-e2e:
    build:
      context: ./apps/api
    container_name: aarohan-test-api-e2e
    restart: unless-stopped
    environment:
      AAROHAN_RUNTIME_PROFILE: test
      AAROHAN_DB_IDENTITY_PURPOSE: E2E
      AAROHAN_DB_IDENTITY_UUID: ${AAROHAN_E2E_DB_IDENTITY_UUID:?AAROHAN_E2E_DB_IDENTITY_UUID required}
      APP_ENV: test
      APP_SECRET: ${APP_SECRET:?APP_SECRET required}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY required}
      E2E_MIGRATE_PASSWORD: ${E2E_MIGRATE_PASSWORD:?E2E_MIGRATE_PASSWORD required}
      E2E_RUNTIME_PASSWORD: ${E2E_RUNTIME_PASSWORD:?E2E_RUNTIME_PASSWORD required}
      MIGRATION_DATABASE_URL: postgresql+psycopg://career_os_e2e_migrate:${E2E_MIGRATE_PASSWORD}@postgres-e2e:5432/career_os_e2e
      DATABASE_URL: postgresql+psycopg://career_os_e2e_runtime:${E2E_RUNTIME_PASSWORD}@postgres-e2e:5432/career_os_e2e
      OAUTH_FIXTURE_MODE: "true"
      CONNECTOR_FIXTURE_MODE: "true"
      ALLOW_E2E_LOGIN_ON_OWNER: "false"
      LOCAL_DEV_AUTH_BYPASS: "false"
      CORS_ORIGINS: "http://127.0.0.1:3001,http://localhost:3001"
      CONFIG_ROOT: /app/config
      CAREER_VAULT_ROOT: /app/career_vault
      GENERATED_ROOT: /app/generated
      SCHEDULING_ENABLED: "false"
      ENABLE_EXTERNAL_EMAIL_SEND: "false"
    volumes:
      - ./config:/app/config:ro
      - ./career_vault:/app/career_vault:ro
      - test_generated_docs:/app/generated
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [career_os_test]

  web-e2e:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE: http://127.0.0.1:8001
    container_name: aarohan-test-web-e2e
    restart: unless-stopped
    depends_on:
      api-e2e:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE: http://127.0.0.1:8001
      NEXT_PUBLIC_DEPLOYMENT_BADGE: E2E TEST
    ports:
      - "127.0.0.1:3001:3000"
    networks: [career_os_test]

networks:
  career_os_test:

volumes:
  postgres_e2e_data:
  test_generated_docs:
