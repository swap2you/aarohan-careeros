services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: career_os
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: career_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [career_os]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_os -d career_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_SECRET: ${APP_SECRET:?APP_SECRET required}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql+psycopg://career_os:${POSTGRES_PASSWORD}@postgres:5432/career_os
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CORS_ORIGINS: http://localhost:3000
      OAUTH_FIXTURE_MODE: ${OAUTH_FIXTURE_MODE:-true}
      SCHEDULING_ENABLED: "false"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_JSON_PATH: /run/secrets/google-oauth-client.json
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:-${GOOGLE_DRIVE_FOLDER_ID:-}}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8000/api/integrations/google/callback}
      CAREER_GMAIL_ADDRESS: ${CAREER_GMAIL_ADDRESS:-swapnilpatil.tech@gmail.com}
      ENABLE_EXTERNAL_EMAIL_SEND: ${ENABLE_EXTERNAL_EMAIL_SEND:-false}
      TEST_EMAIL_ALLOWLIST: ${TEST_EMAIL_ALLOWLIST:-}
      AI_API_KEY: ${AI_API_KEY:-}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-}
    volumes:
      - ./config:/app/config:ro
      - ./career_vault:/app/career_vault:ro
      - generated_docs:/app/generated
      - ${GOOGLE_OAUTH_SECRETS_DIR:-C:/AarohanSecrets}:/run/secrets:ro
    ports:
      - "8000:8000"
    networks: [career_os]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    networks: [career_os]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  n8n:
    image: n8nio/n8n:1.70.3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: career_os
      DB_POSTGRESDB_USER: career_os
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY required}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: America/New_York
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/import/workflows:ro
    networks: [career_os]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 45s

networks:
  career_os:

volumes:
  postgres_data:
  generated_docs:
  n8n_data:
